# KOC batch scheduler configuration

# Maximum number of concurrent WebSocket connections
concurrency: 5

# Delay between starting each role (ms; avoids server rate limiting)
delay_between_ms: 2000

# Daily task execution time (24-hour HH:MM format)
schedule_time: "08:10"

# Friday override for the daily task start time (24-hour HH:MM format)
friday_daily_start_time: "12:10"

# Maximum daily task retry count
max_daily_retries: 3

# Club vehicle dispatch feature (Monday through Wednesday, schedule_time to 20:00)
car_enabled: true

# Weekly task execution day (Mon/Tue/Wed/Thu/Fri/Sat/Sun)
weekly_schedule_day: "Sat"

# Quiz task (default: true)
study_enabled: true

# Salted General Tower (default: true)
tower_enabled: true

# Evo Tower (default: true)
evotower_enabled: true

# Free capsule draw (default: true)
gacha_enabled: true

# Main-loop check interval (seconds)
check_interval_secs: 300

# Hangup: claim and extend after this many hours have elapsed
hangup_threshold_hours: 8.0

# Salt Jar: stop and start to extend its duration when time remaining is below this threshold
bottle_threshold_hours: 1.0

# Cultivation-technique fragments: claim interval in hours
legacy_interval_hours: 4.0

# Output directory for bin files generated by token_gen QR-code login
bin_output_dir: bins/

# Default bin directory (used only by batch/profile; verify/study do not depend on it)
default_bin_path: bins

# Default formations
formations:
  defaults:
    arena: 1
    tower: 1
    evotower: 1
    boss_daily: 1
    boss_legion: 1

# A role can override formations for specific contexts, for example:
# bins:
#   - bin: account.bin
#     roles:
#       - server_id: 10000
#         formations:
#           tower: 2
#           evotower: 3
#           boss_daily: 4
#           boss_legion: 4
#         dream_shop:
#           enabled: true
#           purchase_list:
#             - "1-5" # Basic merchant - Salted-Fish God ticket
#             - "1-6" # Basic merchant - Salted-Fish God torch
#             - "3-1" # Advanced merchant - platinum chest
#             - "3-2" # Advanced merchant - golden fishing rod

dream_shop_presets:
  basic_daily_shop:
    enabled: true
    purchase_list:
      - "1-5" # Basic merchant - Salted-Fish God ticket
      - "1-6" # Basic merchant - Salted-Fish God torch
      - "3-1" # Advanced merchant - platinum chest
      - "3-2" # Advanced merchant - golden fishing rod

# Maintenance windows: skip the entire round without connecting to the server
maintenance_windows:
  - weekday: Fri
    start_time: "05:00"
    end_time: "07:00"
  - weekday: Sat
    start_time: "19:15"
    end_time: "21:15"
  - weekday: Sun
    start_time: "19:15"
    end_time: "20:45"

# === Role groups (used by CLI --group) ===
groups: []
#   - primary
#   - secondary

# === bin file lists ===
# Preserve this structure when adding a new bin:
# bins:
# - bin: another.bin
#   roles:
#     - server_id: 10000
#     - server_id: 1010000
bins: []
